<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Чебурашка</title>
    <style>
        /* ---------- ГЛОБАЛЬНЫЕ СТИЛИ И АНИМАЦИИ ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0a1a2a 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', sans-serif;
            min-height: 100vh;
            padding: 12px;
            animation: fadeIn 0.8s ease-out;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-wrapper {
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .box, .box1 {
            background: rgba(15, 25, 45, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 20px;
            margin: 16px auto;
            max-width: 1200px;
            width: 100%;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: slideUp 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @media (min-width: 1300px) {
            .box, .box1 { max-width: 1000px; }
        }

        .box:hover, .box1:hover {
            transform: translateY(-3px);
            box-shadow: 0 35px 55px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 215, 0, 0.2);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(60px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            width: 90px;
            border-radius: 50%;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            transition: all 0.4s;
            animation: floatLogo 3s infinite ease-in-out;
        }

        @keyframes floatLogo {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        .logo:hover {
            transform: scale(1.05) rotate(3deg);
            filter: drop-shadow(0 0 15px #ffd966);
        }

        h1 {
            font-size: clamp(32px, 8vw, 64px);
            font-weight: 800;
            text-align: center;
            margin: 16px 0;
            letter-spacing: 4px;
        }

        h1 span {
            display: inline-block;
            animation: bounceLetter 0.5s ease forwards;
            opacity: 0;
            transform: translateY(30px);
            color: #ffd966;
            text-shadow: 0 0 15px rgba(255, 217, 102, 0.5);
        }

        @keyframes bounceLetter {
            to { opacity: 1; transform: translateY(0); }
        }

        h1 span:nth-child(1) { animation-delay: 0.05s; }
        h1 span:nth-child(2) { animation-delay: 0.1s; }
        h1 span:nth-child(3) { animation-delay: 0.15s; }
        h1 span:nth-child(4) { animation-delay: 0.2s; }
        h1 span:nth-child(5) { animation-delay: 0.25s; }
        h1 span:nth-child(6) { animation-delay: 0.3s; }
        h1 span:nth-child(7) { animation-delay: 0.35s; }
        h1 span:nth-child(8) { animation-delay: 0.4s; }
        h1 span:nth-child(9) { animation-delay: 0.45s; }

        .gradient-text {
            background: linear-gradient(135deg, #fff8e7, #ffd966, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: clamp(14px, 4vw, 22px);
            text-align: center;
            font-weight: 500;
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        .переключатель-кнопка {
            background: linear-gradient(45deg, #ffb347, #ff8c00);
            border: none;
            padding: 14px 24px;
            font-size: clamp(14px, 4vw, 20px);
            font-weight: bold;
            color: white;
            border-radius: 60px;
            cursor: pointer;
            margin: 20px auto;
            display: block;
            transition: all 0.25s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            width: fit-content;
            min-width: 200px;
        }

        .переключатель-кнопка:hover {
            transform: scale(1.03);
            box-shadow: 0 12px 28px rgba(255, 140, 0, 0.5);
            background: linear-gradient(45deg, #ffc107, #ff7b00);
        }

        .переключатель-кнопка.pressed { transform: scale(0.96); transition: 0.05s linear; }

        .скрываемый-текст {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.7s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 28px;
            padding: 0 12px;
        }

        .скрываемый-текст.показан {
            max-height: 3000px;
            opacity: 1;
            padding: 16px;
            margin-top: 16px;
        }

        select {
            background: #1e2a3a;
            color: #ffefc0;
            padding: 12px 16px;
            border-radius: 50px;
            border: 1px solid #ffd966;
            font-size: 14px;
            margin: 12px 0;
            cursor: pointer;
            width: 100%;
        }

        select:hover {
            background: #2a3a4a;
            border-color: #ffaa33;
        }

        .box1 h2 {
            color: #ffdfa5;
            margin-bottom: 16px;
            font-size: clamp(18px, 5vw, 28px);
        }

        textarea {
            width: 100%;
            background: #0f1a24;
            border: 2px solid #ffd96666;
            border-radius: 24px;
            padding: 14px;
            color: white;
            font-size: 14px;
            transition: 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: #ffd966;
            box-shadow: 0 0 18px rgba(255, 217, 102, 0.3);
        }

        button[type="submit"] {
            background: #ff8c42;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: all 0.25s;
            width: 100%;
            max-width: 280px;
        }

        button[type="submit"]:hover {
            background: #ffaa55;
            transform: scale(1.02);
        }

        /* Слайдер */
        .slider-container {
            margin: 20px auto 30px;
            position: relative;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            background: #1a2a3a;
            max-width: 100%;
            width: 100%;
        }

        @media (min-width: 1300px) {
            .slider-container { max-width: 800px; }
        }

        .slider-wrapper {
            position: relative;
            width: 100%;
        }

        .slides {
            display: flex;
            transition: transform 0.5s ease-in-out;
        }

        .slide {
            min-width: 100%;
            position: relative;
            line-height: 0;
            cursor: pointer;
        }

        .slide img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 24px;
            transition: transform 0.2s ease;
        }

        .slide img:hover { transform: scale(1.02); }

        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.6);
            color: #ffd966;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .slider-btn:hover {
            background: #ffd966;
            color: #1a2a3a;
            transform: translateY(-50%) scale(1.1);
        }

        .slider-btn.prev { left: 15px; }
        .slider-btn.next { right: 15px; }

        .slider-dots {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
            padding-bottom: 15px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 217, 102, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .dot.active {
            background: #ffd966;
            width: 25px;
            border-radius: 10px;
        }

        /* Модальное окно для фото */
        .modal-photo {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            cursor: pointer;
            justify-content: center;
            align-items: center;
            animation: fadeInModal 0.3s ease;
        }

        @keyframes fadeInModal {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-photo img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 16px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            animation: zoomIn 0.3s ease;
        }

        @keyframes zoomIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            color: #ffd966;
            cursor: pointer;
            transition: 0.2s;
            z-index: 2001;
        }

        .modal-close:hover {
            transform: scale(1.2);
            color: #ffaa33;
        }

        /* Модальное окно для описания служения */
        .modal-description {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            animation: fadeInModal 0.3s ease;
        }

        .modal-description-content {
            background: linear-gradient(135deg, #1e2a3a, #0f1a24);
            border-radius: 32px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80%;
            overflow-y: auto;
            border: 2px solid #ffd966;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: zoomIn 0.3s ease;
        }

        .modal-description-content h3 {
            color: #ffd966;
            font-size: 28px;
            margin-bottom: 20px;
            text-align: center;
        }

        .modal-description-content p {
            color: #f0f0f0;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .modal-description-close {
            background: #ff8c42;
            border: none;
            padding: 10px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            display: block;
            margin: 0 auto;
            transition: 0.2s;
        }

        .modal-description-close:hover {
            background: #ffaa55;
            transform: scale(1.02);
        }

        /* Видео */
        .video-section {
            margin: 20px 0;
        }

        @media (min-width: 1300px) {
            .video-section {
                max-width: 800px;
                margin-left: auto;
                margin-right: auto;
            }
        }

        .video-title {
            text-align: center;
            color: #ffd966;
            font-size: 20px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .video {
            width: 100%;
            border-radius: 24px;
            display: block;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5);
            transition: 0.4s;
            border: 2px solid rgba(255, 217, 102, 0.3);
        }

        .video:hover {
            transform: scale(1.01);
            border-color: #ffd966;
        }

        /* Расписание */
        .расписание-вертикальное {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }

        .служащий-карточка {
            background: rgba(20, 30, 45, 0.8);
            backdrop-filter: blur(4px);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255, 217, 102, 0.2);
            transition: all 0.3s ease;
        }

        .служащий-карточка:hover {
            transform: translateX(5px);
            border-color: #ffd966;
        }

        .имя-служащего {
            background: linear-gradient(135deg, #ffb34730, #ff8c0030);
            padding: 14px 18px;
            font-weight: bold;
            font-size: 18px;
            color: #ffdd99;
            border-bottom: 2px solid #ffb347;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .имя-служащего::before {
            content: "👤";
            font-size: 20px;
        }

        .дни-сетка {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 8px;
            padding: 14px;
        }

        .день-ячейка {
            background: rgba(30, 40, 55, 0.6);
            border-radius: 16px;
            padding: 10px 6px;
            text-align: center;
        }

        .название-дня {
            font-size: 12px;
            font-weight: bold;
            color: #ffd966;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
        }

        .значение-служения {
            font-size: 14px;
            font-weight: 500;
            color: #f0f0f0;
            padding: 6px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.3);
            cursor: pointer;
            transition: all 0.2s;
            word-break: break-word;
        }

        .значение-служения:empty::before {
            content: "—";
            opacity: 0.5;
        }

        .значение-служения.свободно {
            background: linear-gradient(145deg, #1e7a4a, #0f5e38);
            color: white;
            font-weight: bold;
            box-shadow: 0 0 8px rgba(46, 204, 113, 0.5);
            animation: pulseGreen 1.8s infinite;
        }

        @keyframes pulseGreen {
            0% { box-shadow: 0 0 0 0 rgba(70, 200, 120, 0.5); }
            70% { box-shadow: 0 0 0 8px rgba(70, 200, 120, 0); }
            100% { box-shadow: 0 0 0 0 rgba(70, 200, 120, 0); }
        }

        .значение-служения.свободно:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        .значение-служения:hover {
            background: rgba(50, 70, 95, 0.9);
            transform: scale(1.02);
        }

        .подзаголовок {
            font-size: 10px;
            color: #ffaa66;
            display: block;
            margin-top: 4px;
        }

        .кнопка-подробнее {
            background: rgba(255, 217, 102, 0.2);
            border: 1px solid #ffd966;
            padding: 8px 16px;
            margin: 12px 14px 14px auto;
            border-radius: 30px;
            color: #ffd966;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            width: fit-content;
        }

        .кнопка-подробнее:hover {
            background: #ffd966;
            color: #1a2a3a;
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(255, 217, 102, 0.5);
        }

        @media (max-width: 550px) {
            .дни-сетка { grid-template-columns: repeat(2, 1fr); }
            body { padding: 8px; }
            .box, .box1 { padding: 16px; }
            .slider-btn { width: 35px; height: 35px; font-size: 18px; }
        }

        @media (min-width: 551px) and (max-width: 800px) {
            .дни-сетка { grid-template-columns: repeat(3, 1fr); }
        }

        [contenteditable="true"] { outline: none; }
        [contenteditable="true"]:focus {
            background: #2a4a6a;
            box-shadow: 0 0 0 2px #ffd966;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
<div class="main-wrapper">
    <div class="box">
        <div style="text-align:center"><img class="logo" src="Снимок.jpg" alt="Логотип Чебурашка"></div>
        <h1>
            <span>Ч</span><span>е</span><span>б</span><span>у</span><span>р</span><span>а</span><span>ш</span><span>к</span><span>а</span>
        </h1>
        <h1 class="gradient-text">Первое собрание и открытие было на Монастырской 96,<br> 8 июля 2014 года.</h1>

        <!-- СЛАЙДЕР -->
        <div class="slider-container">
            <div class="slider-wrapper">
                <div class="slides" id="slides">
                    <div class="slide"><img src="Av41eZpQ86FLXqWNyw2C7tZvpUZ7PS5bgsW89vLE1PiOpEJ9iPFXaPPOAgd6HZVDErRbfuw6x1QojCTuAb89xoLW.jpg" alt="Чебурашка 1"></div>
                    <div class="slide"><img src="vvRcOSlic45vRcXAINFTrRphNgyGPyIL8XpNbjWId3-q0G9gY5YQH7v03uGB2c1a9FKg0PKfn2aNd0p7HOalAYy_.jpg" alt="Чебурашка 2"></div>
                    <div class="slide"><img src="литвечер.jpg" alt="Чебурашка 3"></div>
                </div>
                <button class="slider-btn prev" id="prevBtn">❮</button>
                <button class="slider-btn next" id="nextBtn">❯</button>
            </div>
            <div class="slider-dots" id="dots"></div>
        </div>

        <!-- Модальное окно для фото -->
        <div id="photoModal" class="modal-photo">
            <span class="modal-close" id="photoModalClose">&times;</span>
            <img id="modalImage" src="" alt="Увеличенное фото">
        </div>

        <!-- ВИДЕО -->
        <div class="video-section">
            <div class="video-title">🎬  видео как добраться до чебурашки</div>
            <video class="video" muted src="video_2025-05-03_02-16-32.mp4" autoplay loop playsinline></video>
        </div>

        <button class="переключатель-кнопка" id="кнопка-переключения">📋 Доступные вакантные служения</button>

        <div class="скрываемый-текст" id="текст-для-переключения">
            <p style="text-align:center; font-size: clamp(12px, 3.5vw, 1.2rem); margin-bottom: 16px;">
                🟢 <strong style="color:#6fef9f;">Доступные служения</strong> 
            </p>
            <div id="schedule-container"></div>
            <br>
            <label for="mySelect">📅 Собрания проходят:</label>
            <select id="mySelect" name="mySelect">
                <option>Понедельник с 18:30 до 20:00</option>
                <option>Вторник с 18:30 до 20:00</option>
                <option>Среда с 18:30 до 20:00</option>
                <option>Четверг с 18:30 до 20:00</option>
                <option>Пятница с 18:30 до 20:00</option>
                <option>Суббота с 18:30 до 20:00</option>
                <option>Воскресенье утро c 11:00 до 12:00</option>
                <option>Воскресенье вечер с 18:30 до 19:30</option>
            </select>
        </div>
    </div>

    <div class="box1">
        <h2>✉️ Отправить анонимный вопрос на собрание гр.Чебурашка</h2>
        <form id="telegramForm">
            <label for="message">Сообщение:</label><br>
            <textarea id="message" name="message" rows="4" required placeholder="Ваш вопрос будет отправлен анонимно..."></textarea><br><br>
            <button type="submit">🚀 Отправить анонимно</button>
        </form>
    </div>
</div>

<!-- Модальное окно для описания служения -->
<div id="descriptionModal" class="modal-description">
    <div class="modal-description-content">
        <h3 id="modalServiceTitle"></h3>
        <p id="modalServiceDescription"></p>
        <button class="modal-description-close" id="descriptionModalClose">Закрыть</button>
    </div>
</div>

<script>
    // ---------------------- КНОПКА СКРЫТИЯ/ПОКАЗА ----------------------
    const кнопкаПереключения = document.getElementById('кнопка-переключения');
    const текстДляПереключения = document.getElementById('текст-для-переключения');

    кнопкаПереключения.addEventListener('click', function() {
        текстДляПереключения.classList.toggle('показан');
        кнопкаПереключения.textContent = текстДляПереключения.classList.contains('показан') 
            ? '🔒 Скрыть вакантные служения' 
            : '📋 Доступные вакантные служения';
    });

    кнопкаПереключения.addEventListener('mousedown', () => кнопкаПереключения.classList.add('pressed'));
    кнопкаПереключения.addEventListener('mouseup', () => кнопкаПереключения.classList.remove('pressed'));
    кнопкаПереключения.addEventListener('mouseleave', () => кнопкаПереключения.classList.remove('pressed'));

    // ---------------------- ТЕЛЕГРАМ ----------------------
    const TELEGRAM_TOKEN = '7831903358:AAHIkRNmstPV5QYoRC5GYqGiuGppTlLiotk';
    const CHAT_ID = '-1002657190873';

    document.getElementById('telegramForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const message = document.getElementById('message').value.trim();
        if (!message) {
            alert('Пожалуйста, введите сообщение.');
            return;
        }
        axios.post(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, { chat_id: CHAT_ID, text: message })
            .then(() => {
                alert('✅ Сообщение успешно отправлено!');
                document.getElementById('telegramForm').reset();
            })
            .catch((error) => {
                alert('❌ Ошибка при отправке.');
                console.error(error);
            });
    });

    // ---------------------- СЛАЙДЕР ----------------------
    let currentIndex = 0;
    const slides = document.getElementById('slides');
    const slidesCount = document.querySelectorAll('.slide').length;
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const dotsContainer = document.getElementById('dots');

    function createDots() {
        dotsContainer.innerHTML = '';
        for (let i = 0; i < slidesCount; i++) {
            const dot = document.createElement('div');
            dot.classList.add('dot');
            if (i === currentIndex) dot.classList.add('active');
            dot.addEventListener('click', () => goToSlide(i));
            dotsContainer.appendChild(dot);
        }
    }

    function updateDots() {
        document.querySelectorAll('.dot').forEach((dot, index) => {
            dot.classList.toggle('active', index === currentIndex);
        });
    }

    function goToSlide(index) {
        currentIndex = Math.max(0, Math.min(index, slidesCount - 1));
        slides.style.transform = `translateX(${-currentIndex * 100}%)`;
        updateDots();
    }

    function nextSlide() { goToSlide(currentIndex + 1 >= slidesCount ? 0 : currentIndex + 1); }
    function prevSlide() { goToSlide(currentIndex - 1 < 0 ? slidesCount - 1 : currentIndex - 1); }

    prevBtn.addEventListener('click', prevSlide);
    nextBtn.addEventListener('click', nextSlide);
    createDots();
    goToSlide(0);

    // ---------------------- МОДАЛЬНОЕ ОКНО ДЛЯ ФОТО (РАБОТАЕТ КОРРЕКТНО) ----------------------
    const photoModal = document.getElementById('photoModal');
    const modalImage = document.getElementById('modalImage');
    const photoModalClose = document.getElementById('photoModalClose');

    function openPhotoModal(src) {
        modalImage.src = src;
        photoModal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closePhotoModal() {
        photoModal.style.display = 'none';
        modalImage.src = '';
        document.body.style.overflow = '';
    }

    // Клик по фото в слайдере
    document.querySelectorAll('.slide img').forEach(img => {
        img.addEventListener('click', (e) => {
            e.stopPropagation();
            openPhotoModal(img.src);
        });
    });

    // Закрытие по крестику или по фону
    photoModalClose.addEventListener('click', closePhotoModal);
    photoModal.addEventListener('click', (e) => { if (e.target === photoModal) closePhotoModal(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && photoModal.style.display === 'flex') closePhotoModal(); });

    // ---------------------- ОПИСАНИЯ СЛУЖЕНИЙ ----------------------
    const descriptions = {
        "Ведущий": "Ведущий отвечает за проведение собрания: открывает встречу, следит за регламентом, предоставляет слово выступающим, поддерживает порядок и создаёт доброжелательную атмосферу. Требуются навыки публичных выступлений и организаторские способности.",
        "Чайханщик": "Чайханщик заботится о чаепитии после собрания: готовит чай, печенье, сладости, накрывает стол и создаёт уютную обстановку для общения. Важно внимание к деталям и гостеприимство.",
        "Уборщик": "Уборщик поддерживает чистоту в помещении до и после собрания: протирает пыль, моет полы, приводит в порядок мебель. Ответственность и аккуратность — главные качества.",
        "Закупщик": "Закупщик отвечает за приобретение продуктов и материалов для собраний: чай, сахар, печенье, бумажные стаканчики и другие необходимые мелочи. Требуется умение планировать бюджет и вовремя делать закупки.",
        "Литком": "Литком (литературный комитет) отвечает за подбор литературы, статей и материалов для духовного развития группы. Подготавливает темы для обсуждения, распечатывает раздаточные материалы и ведёт библиотеку собрания."
    };

    // ---------------------- ВЕРТИКАЛЬНОЕ РАСПИСАНИЕ ----------------------
    const служащие = [
        { имя: "Ведущий", тип: "утро-вечер", расписание: { "Пн_утро": "с", "Пн_вечер": "", "Вт_утро": "", "Вт_вечер": "с", "Ср_утро": "с", "Ср_вечер": "", "Чт_утро": "", "Чт_вечер": "с", "Пт_утро": "с", "Пт_вечер": "", "Сб_утро": "", "Сб_вечер": "с", "Вс_утро": "с", "Вс_вечер": "" } },
        { имя: "Чайханщик", тип: "утро-вечер", расписание: { "Пн_утро": "", "Пн_вечер": "с", "Вт_утро": "с", "Вт_вечер": "", "Ср_утро": "", "Ср_вечер": "с", "Чт_утро": "с", "Чт_вечер": "", "Пт_утро": "", "Пт_вечер": "с", "Сб_утро": "с", "Сб_вечер": "", "Вс_утро": "", "Вс_вечер": "с" } },
        { имя: "Уборщик", тип: "утро-вечер", расписание: { "Пн_утро": "с", "Пн_вечер": "", "Вт_утро": "", "Вт_вечер": "с", "Ср_утро": "с", "Ср_вечер": "", "Чт_утро": "", "Чт_вечер": "с", "Пт_утро": "с", "Пт_вечер": "", "Сб_утро": "", "Сб_вечер": "с", "Вс_утро": "с", "Вс_вечер": "" } },
        { имя: "Закупщик", тип: "обычный", расписание: { "Пн": "с", "Вт": "", "Ср": "", "Чт": "с", "Пт": "с", "Сб": "", "Вс": "" } },
        { имя: "Литком", тип: "обычный", расписание: { "Пн": "с", "Вт": "с", "Ср": "", "Чт": "", "Пт": "с", "Сб": "", "Вс": "с" } }
    ];

    const дниНеделиОбычные = [
        { короткий: "Пн", полный: "Понедельник" }, { короткий: "Вт", полный: "Вторник" },
        { короткий: "Ср", полный: "Среда" }, { короткий: "Чт", полный: "Четверг" },
        { короткий: "Пт", полный: "Пятница" }, { короткий: "Сб", полный: "Суббота" },
        { короткий: "Вс", полный: "Воскресенье" }
    ];

    const дниНеделиУтроВечер = [
        { короткий: "Пн_утро", название: "Пн", подзаголовок: "утро" }, { короткий: "Пн_вечер", название: "Пн", подзаголовок: "вечер" },
        { короткий: "Вт_утро", название: "Вт", подзаголовок: "утро" }, { короткий: "Вт_вечер", название: "Вт", подзаголовок: "вечер" },
        { короткий: "Ср_утро", название: "Ср", подзаголовок: "утро" }, { короткий: "Ср_вечер", название: "Ср", подзаголовок: "вечер" },
        { короткий: "Чт_утро", название: "Чт", подзаголовок: "утро" }, { короткий: "Чт_вечер", название: "Чт", подзаголовок: "вечер" },
        { короткий: "Пт_утро", название: "Пт", подзаголовок: "утро" }, { короткий: "Пт_вечер", название: "Пт", подзаголовок: "вечер" },
        { короткий: "Сб_утро", название: "Сб", подзаголовок: "утро" }, { короткий: "Сб_вечер", название: "Сб", подзаголовок: "вечер" },
        { короткий: "Вс_утро", название: "Вс", подзаголовок: "утро" }, { короткий: "Вс_вечер", название: "Вс", подзаголовок: "вечер" }
    ];

    const descriptionModal = document.getElementById('descriptionModal');
    const modalServiceTitle = document.getElementById('modalServiceTitle');
    const modalServiceDescription = document.getElementById('modalServiceDescription');
    const descriptionModalClose = document.getElementById('descriptionModalClose');

    function openDescriptionModal(serviceName) {
        modalServiceTitle.textContent = serviceName;
        modalServiceDescription.textContent = descriptions[serviceName] || "Описание служения пока не добавлено. Скоро появится!";
        descriptionModal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closeDescriptionModal() {
        descriptionModal.style.display = 'none';
        document.body.style.overflow = '';
    }

    descriptionModalClose.addEventListener('click', closeDescriptionModal);
    descriptionModal.addEventListener('click', (e) => { if (e.target === descriptionModal) closeDescriptionModal(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && descriptionModal.style.display === 'flex') closeDescriptionModal(); });

    function создатьВертикальноеРасписание() {
        const container = document.getElementById("schedule-container");
        if (!container) return;
        container.innerHTML = '';
        
        const вертикальныйКонтейнер = document.createElement("div");
        вертикальныйКонтейнер.className = "расписание-вертикальное";
        
        служащие.forEach(служащий => {
            const карточка = document.createElement("div");
            карточка.className = "служащий-карточка";
            
            const имяБлок = document.createElement("div");
            имяБлок.className = "имя-служащего";
            имяБлок.innerText = служащий.имя;
            карточка.appendChild(имяБлок);
            
            const дниСетка = document.createElement("div");
            дниСетка.className = "дни-сетка";
            
            if (служащий.тип === "утро-вечер") {
                дниНеделиУтроВечер.forEach(день => {
                    const деньЯчейка = document.createElement("div");
                    деньЯчейка.className = "день-ячейка";
                    
                    const названиеДня = document.createElement("span");
                    названиеДня.className = "название-дня";
                    названиеДня.innerText = день.название;
                    
                    const подзаголовок = document.createElement("span");
                    подзаголовок.className = "подзаголовок";
                    подзаголовок.innerText = день.подзаголовок;
                    
                    const значениеСлужения = document.createElement("div");
                    значениеСлужения.className = "значение-служения";
                    let значение = служащий.расписание[день.короткий] || "";
                    значениеСлужения.innerText = значение;
                    
                    if (значение.toLowerCase().trim() === "с") {
                        значениеСлужения.classList.add("свободно");
                        значениеСлужения.title = "✅ Свободное служение! Можно занять.";
                    }
                    
                    значениеСлужения.contentEditable = true;
                    значениеСлужения.addEventListener("blur", function() {
                        let новоеЗначение = значениеСлужения.innerText.trim();
                        служащий.расписание[день.короткий] = новоеЗначение;
                        if (новоеЗначение.toLowerCase() === "с") {
                            значениеСлужения.classList.add("свободно");
                            значениеСлужения.title = "✅ Свободное служение! Можно занять.";
                        } else {
                            значениеСлужения.classList.remove("свободно");
                            значениеСлужения.title = "";
                        }
                        if (новоеЗначение === "") значениеСлужения.innerText = "";
                    });
                    
                    деньЯчейка.appendChild(названиеДня);
                    деньЯчейка.appendChild(подзаголовок);
                    деньЯчейка.appendChild(значениеСлужения);
                    дниСетка.appendChild(деньЯчейка);
                });
            } else {
                дниНеделиОбычные.forEach(день => {
                    const деньЯчейка = document.createElement("div");
                    деньЯчейка.className = "день-ячейка";
                    
                    const названиеДня = document.createElement("span");
                    названиеДня.className = "название-дня";
                    названиеДня.innerText = день.короткий;
                    
                    const значениеСлужения = document.createElement("div");
                    значениеСлужения.className = "значение-служения";
                    let значение = служащий.расписание[день.короткий] || "";
                    значениеСлужения.innerText = значение;
                    
                    if (значение.toLowerCase().trim() === "с") {
                        значениеСлужения.classList.add("свободно");
                        значениеСлужения.title = "✅ Свободное служение! Можно занять.";
                    }
                    
                    значениеСлужения.contentEditable = true;
                    значениеСлужения.addEventListener("blur", function() {
                        let новоеЗначение = значениеСлужения.innerText.trim();
                        служащий.расписание[день.короткий] = новоеЗначение;
                        if (новоеЗначение.toLowerCase() === "с") {
                            значениеСлужения.classList.add("свободно");
                            значениеСлужения.title = "✅ Свободное служение! Можно занять.";
                        } else {
                            значениеСлужения.classList.remove("свободно");
                            значениеСлужения.title = "";
                        }
                        if (новоеЗначение === "") значениеСлужения.innerText = "";
                    });
                    
                    деньЯчейка.appendChild(названиеДня);
                    деньЯчейка.appendChild(значениеСлужения);
                    дниСетка.appendChild(деньЯчейка);
                });
            }
            
            карточка.appendChild(дниСетка);
            
            // Кнопка "Подробнее о служении"
            const кнопка = document.createElement("div");
            кнопка.className = "кнопка-подробнее";
            кнопка.innerText = "📖 Подробнее о служении";
            кнопка.addEventListener("click", () => openDescriptionModal(служащий.имя));
            карточка.appendChild(кнопка);
            
            вертикальныйКонтейнер.appendChild(карточка);
        });
        
        container.appendChild(вертикальныйКонтейнер);
    }

    window.onload = () => {
        создатьВертикальноеРасписание();
        const videoElem = document.querySelector('.video');
        if (videoElem) videoElem.play().catch(e => console.log("Автовоспроизведение заблокировано"));
    };
</script>
